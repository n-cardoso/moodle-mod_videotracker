name: Moodle Plugin CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    name: PHP 8.2 • mariadb

    services:
      mariadb:
        image: mariadb:10
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          path: plugin

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl, mbstring, xml, curl, soap, zip, gd, mysqli, pgsql
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci/bin && pwd)" >> "$GITHUB_PATH"
          echo "$(cd ci/vendor/bin && pwd)" >> "$GITHUB_PATH"
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> "$GITHUB_ENV"

      - name: Install moodle-plugin-ci
        run: |
          cd ci
          php bin/moodle-plugin-ci install \
            --plugin ../plugin \
            --db-host=127.0.0.1 \
            --db-type=mariadb \
            --db-user=root \
            --db-pass=root \
            --db-name=moodle
        env:
          MOODLE_BRANCH: MOODLE_405_STABLE

      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        continue-on-error: true
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Moodle PHPDoc Checker
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validate plugin metadata
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        run: moodle-plugin-ci mustache

      - name: Grunt
        id: grunt
        continue-on-error: true
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: Inspect AMD build output
        if: always()
        run: |
          echo "=== amd/build contents ==="
          ls -la ci/moodle/mod/videotracker/amd/build
          echo
          echo "=== git status for amd/build ==="
          cd ci/moodle/mod/videotracker
          git status --short amd/build


      - name: Upload AMD build artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mod_videotracker-amd-build
          path: ci/moodle/mod/videotracker/amd/build/
          if-no-files-found: error

